name: Git Push
run-name: CI - Git Push
on:
  push:
    branches:
      - main
      - stable
      - next
      - testing
      - staging
      - edge
      - experimental
jobs:
  develop_on:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    env:
        TERM: xterm-256color
        ROBOT_NAME: "Github Actions Autonomous Runner System"
        ROBOT_EMAIL: "github.actions.runner@github.com"
        REPO_NAME: ${{ github.repository }}
        REPO_URL: "${{ github.server_url  }}/${{ github.repository }}"
        REPO_COMMIT: "${{ github.sha }}"
        CONTAINER_USERNAME: ${{ secrets.CONTAINER_USERNAME }}
        CONTAINER_PASSWORD: ${{ secrets.CONTAINER_PASSWORD }}
        TWINE_USERNAME: ${{ secrets.TWINE_USERNAME }}
        TWINE_PASSWORD: ${{ secrets.TWINE_PASSWORD }}
        PROJECT_SIMULATE_RUN: true
        PROJECT_ROBOT_RUN: true
        PROJECT_ROBOT_GITHUB_TOKEN: "${{ github.token }}"
    steps:
      - name: INIT
        id: github_actions_init
        run: |
          git config --global user.email "${{ env.ROBOT_NAME }}"
          git config --global user.name "${{ env.ROBOT_EMAIL }}"
          git config --global advice.detachedHead false
          git clone --depth=1 ${{ env.REPO_URL }} .
          git fetch origin ${{ env.REPO_COMMIT }}
          git checkout FETCH_HEAD
      - name: PURGE
        id: ci_purge
        run: |
          echo "purge job"
      - name: CLEAN
        id: ci_clean
        run: |
          echo "clean job"
      - name: ENVIRONMENT
        id: ci_env
        run: |
          echo "env job"
      - name: SETUP
        id: ci_setup
        run: |
          echo "setup job"
      - name: PREPARE
        id: ci_prepare
        run: |
          echo "prepare job"
      - name: START
        id: ci_start
        run: |
          echo "start job"
      - name: TEST
        id: ci_test
        run: |
          echo "test job"
      - name: MATERIALIZE
        id: ci_materialize
        run: |
          echo "materialize job"
      - name: BUILD
        id: ci_build
        run: |
          echo "build job"
      - name: NOTARIZE
        id: ci_notarize
        run: |
          echo "notarize job"
      - name: PACKAGE
        id: ci_package
        run: |
          echo "package job"
      - name: RELEASE
        id: ci_release
        run: |
          echo "release job"
      - name: STOP
        id: ci_stop
        run: |
          echo "stop job"
      - name: DEPLOY
        id: ci_deploy
        run: |
          echo "deploy job"
      - name: COMPOSE
        id: ci_compose
        run: |
          echo "compose job"
      - name: PUBLISH
        id: ci_publish
        run: |
          echo "publish job"
      - name: ARCHIVE
        id: ci_archive
        if: always()
        run: |
          echo "archive job"
      - name: GITHUB ACTIONS - Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          if-no-files-found: ignore
          compression-level: 0
          path: |
            artifact-build_*
      - name: GITHUB ACTIONS - Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workspace-${{ matrix.os }}
          if-no-files-found: ignore
          compression-level: 0
          path: |
            artifact-workspace_*
